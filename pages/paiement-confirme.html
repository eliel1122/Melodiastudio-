<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Paiement · Melodia Studio · Abidjan</title>
  <meta name="theme-color" content="#08080C" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/design-system.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <!-- Meta Pixel — chargé tôt pour déclencher l'évènement Achat à la confirmation -->
  <script src="../js/pixel.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="glow glow--blue" aria-hidden="true"></div>

  <div id="nav-mount"></div>

  <main>
    <section class="block" style="min-height:70vh;display:flex;align-items:center;justify-content:center;">
      <div id="pay-result" style="text-align:center;padding:2rem 1.5rem;display:flex;flex-direction:column;gap:1.4rem;align-items:center;max-width:560px;width:100%;">
        <div class="mlc-spinner" style="width:48px;height:48px;border:3px solid rgba(30,144,255,0.25);border-top-color:#1E90FF;border-radius:50%;animation:mlcspin 0.8s linear infinite;"></div>
        <p style="color:var(--fg-dim);">Vérification de ton paiement...</p>
        <style>@keyframes mlcspin{to{transform:rotate(360deg)}}</style>
      </div>
    </section>
  </main>

  <div id="footer-mount"></div>
  <script src="../js/layout.js" defer></script>
  <script>
    const fmtF = (n) => (Number(n) || 0).toLocaleString('fr-FR').replace(/,/g, ' ') + ' F';
    const param = (k) => new URLSearchParams(location.search).get(k);

    function receiptHTML(d, ref) {
      const paidTxt = d.choice === 'acompte' && d.solde
        ? `Acompte payé : <b>${fmtF(d.amount)}</b>`
        : `Payé en totalité : <b>${fmtF(d.amount)}</b>`;
      const soldeTxt = d.choice === 'acompte' && d.solde
        ? `<div class="rc-row"><span>Solde au studio</span><b>${fmtF(d.solde)}</b></div>` : '';
      return `
        <div id="receipt" style="background:#0d0d14;border:1px solid rgba(30,144,255,0.35);border-radius:18px;padding:26px 24px;max-width:400px;width:100%;text-align:left;box-shadow:0 20px 60px rgba(0,0,0,.5);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <div style="font-family:'Anton',sans-serif;font-size:22px;letter-spacing:.5px;color:#F5F5F7;">MELODIA<span style="color:#1E90FF">.</span></div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:#1E90FF;text-transform:uppercase;border:1px solid rgba(30,144,255,.4);border-radius:20px;padding:4px 10px;">Reçu</span>
          </div>
          <div style="display:flex;gap:18px;align-items:center;">
            <div id="qr" style="background:#fff;padding:8px;border-radius:10px;line-height:0;"></div>
            <div style="flex:1;font-size:13px;color:#A8A8B5;line-height:1.7;">
              <div style="color:#F5F5F7;font-weight:600;font-size:15px;margin-bottom:4px;">${d.service || 'Session studio'}</div>
              ${d.date || ''} ${d.slotLabel ? '· ' + d.slotLabel : ''}
            </div>
          </div>
          <div style="margin-top:18px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px;font-size:13px;color:#A8A8B5;display:flex;flex-direction:column;gap:8px;">
            <div class="rc-row" style="display:flex;justify-content:space-between;">${paidTxt}</div>
            ${soldeTxt}
            <div class="rc-row" style="display:flex;justify-content:space-between;"><span>Référence</span><b style="font-family:'JetBrains Mono',monospace;letter-spacing:.05em;color:#F5F5F7;">${ref}</b></div>
          </div>
          <p style="margin:16px 0 0;font-size:10.5px;color:#5a5a68;text-align:center;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;">MELODIASTUDIO.PRO · COCODY RIVIERA 4 M'POUTO</p>
        </div>`;
    }

    const ok = (d, ref) => `
      <div style="width:72px;height:72px;border-radius:50%;background:rgba(30,144,255,0.15);display:flex;align-items:center;justify-content:center;border:1px solid rgba(30,144,255,0.4);">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-11" stroke="#1E90FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="display" style="margin:0;">Créneau bloqué ! 🎙️</h1>
      <p style="color:var(--fg-dim);line-height:1.6;">Voici ton reçu. Reçois ta confirmation, ton QR et ta carte fidélité directement sur WhatsApp 👇</p>
      ${receiptHTML(d, ref)}
      <button id="dl-receipt" class="btn btn--primary btn--lg">⬇ Télécharger le reçu</button>
      <a href="https://wa.me/2250703387738?text=${encodeURIComponent('Salut Melodia 👋 Je viens de réserver sur le site (réf ' + ref + '). Merci de me confirmer 🙏')}" target="_blank" rel="noopener" id="wa-confirm" class="btn btn--lg" style="background:#25D366;color:#fff;border:none;display:inline-flex;align-items:center;gap:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <span>Je reçois ma confirmation sur WhatsApp</span>
      </a>
      <a href="../index.html" class="btn btn--ghost btn--lg">Accueil</a>`;

    const ko = (title, lines) => `
      <div style="width:72px;height:72px;border-radius:50%;background:rgba(255,77,94,0.15);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,77,94,0.4);">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 8v5M12 17.01v-.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#FF4D5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="display" style="margin:0;">${title}</h1>
      <p style="color:var(--fg-dim);line-height:1.6;">${lines}</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
        <a href="booking.html" class="btn btn--primary btn--lg">Réessayer</a>
        <a href="https://wa.me/2250703387738?text=Salut%20Melodia%2C%20j%27ai%20eu%20un%20souci%20de%20paiement." class="btn btn--ghost btn--lg" target="_blank">Nous écrire</a>
      </div>`;

    (async () => {
      const el = document.getElementById('pay-result');
      const ref = param('reference') || param('trxref');
      if (!ref) { el.innerHTML = ko('Paiement introuvable', 'Aucune référence de paiement. Réessaie ta réservation.'); return; }
      try {
        const res = await fetch('/api/verify-payment?reference=' + encodeURIComponent(ref));
        const d = await res.json();
        if (d.ok && d.status === 'success') {
          el.innerHTML = ok(d, ref);
          // Meta Pixel — Achat confirmé (même eventID que le CAPI serveur → dédup)
          try { window.melodiaTrackPurchase && window.melodiaTrackPurchase(d.amount, ref); } catch (_) {}
          // QR : encode l'URL de vérification de la réservation
          try {
            new QRCode(document.getElementById('qr'), {
              text: 'https://melodiastudio.pro/pages/console.html?type=booking&ref=' + encodeURIComponent(ref),
              width: 96, height: 96, correctLevel: QRCode.CorrectLevel.M,
            });
          } catch (_) {}
          document.getElementById('dl-receipt')?.addEventListener('click', async () => {
            const node = document.getElementById('receipt');
            if (!node || !window.html2canvas) return;
            const canvas = await html2canvas(node, { backgroundColor: '#08080C', scale: 2 });
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `recu-melodia-${ref}.png`;
            a.click();
          });
        } else {
          el.innerHTML = ko('Paiement non abouti', 'Le paiement n\'a pas été confirmé, ton créneau vient d\'être libéré. Tu peux réessayer avec le même créneau.');
          // Libère le hold côté serveur
          fetch('/api/release-hold', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reference: ref }),
          }).catch(() => {});
        }
      } catch (e) {
        el.innerHTML = ko('Vérification impossible', 'On n\'a pas pu vérifier le paiement. Si tu as été débité, écris-nous sur WhatsApp avec ta référence : ' + ref);
      }
    })();
  </script>
</body>
</html>
